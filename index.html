<!-- SERVICE TIMING CONTROL -->
<!-- ===================================================== -->

<script>

/* ===================================================== */
/* SERVICE AVAILABILITY */
/* ===================================================== */

function isServiceAvailable(){

const now = new Date();

const indiaTime =
new Date(
now.toLocaleString(
"en-US",
{
timeZone:"Asia/Kolkata"
}
)
);

const hours =
indiaTime.getHours();

const minutes =
indiaTime.getMinutes();

const currentMinutes =
(hours * 60) + minutes;

/* 11:30 AM */

const startMinutes =
(11 * 60) + 30;

/* 4:00 PM */

const endMinutes =
(16 * 60);

return (

currentMinutes >= startMinutes &&

currentMinutes <= endMinutes

);

}


/* ===================================================== */
/* SHOW SERVICE MESSAGE */
/* ===================================================== */

function showServiceClosedMessage(){

document.getElementById("loginStatus")
.innerText =

"Buggy service is available only between 11:30 AM and 4:00 PM";

}


/* ===================================================== */
/* AUTO LOGOUT AFTER 4 PM */
/* ===================================================== */

setInterval(function(){

if(!isServiceAvailable()){

/* Faculty logout */

if(currentFacultyId){

firebase.database()
.ref("facultyAuth/" + currentFacultyId)
.update({

loggedIn:false

});

}

localStorage.clear();

window.location.reload();

}

},60000);

</script>
