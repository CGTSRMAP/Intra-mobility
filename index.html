<script src="app.js?v=17"></script>

<script>

/* ===================================================== */
/* SHA256 */
/* ===================================================== */

async function sha256(message){

const msgBuffer =
new TextEncoder().encode(message);

const hashBuffer =
await crypto.subtle.digest(
'SHA-256',
msgBuffer
);

const hashArray =
Array.from(
new Uint8Array(hashBuffer)
);

const hashHex =
hashArray
.map(b =>
b.toString(16).padStart(2,'0')
)
.join('');

return hashHex;

}

/* ===================================================== */
/* RESTORE SESSION */
/* ===================================================== */

window.onload = function(){

const savedFaculty =
localStorage.getItem("facultyId");

const auth =
localStorage.getItem("facultyAuthenticated");

if(savedFaculty && auth === "true"){

firebase.database()
.ref("facultyAuth/" + savedFaculty)
.once("value")

.then(function(snapshot){

const data = snapshot.val();

if(!data){

localStorage.clear();
return;

}

const age =
Date.now() - (data.lastLogin || 0);

if(age > 3600000){

firebase.database()
.ref("facultyAuth/" + savedFaculty)
.update({

loggedIn:false

});

localStorage.clear();

return;

}

if(data.loggedIn){

currentFacultyId =
savedFaculty;

isAuthenticated =
true;

showDashboard(savedFaculty);

}

})

.catch(function(error){

console.error(
"Session restore error:",
error
);

});

}

};

/* ===================================================== */
/* LOGIN */
/* ===================================================== */

async function loginFaculty(){

const facultyId =
document.getElementById("facultyIdInput")
.value
.trim();

const pin =
document.getElementById("facultyPinInput")
.value
.trim();

if(!facultyId || !pin){

document.getElementById("loginStatus")
.innerText =
"Enter Faculty ID and PIN";

return;

}

const hashedPin =
await sha256(pin);

firebase.database()
.ref("facultyAuth/" + facultyId)
.once("value")

.then(function(snapshot){

const data = snapshot.val();

if(!data){

document.getElementById("loginStatus")
.innerText =
"Invalid Faculty ID";

return;

}

if(data.active !== true){

document.getElementById("loginStatus")
.innerText =
"Faculty access disabled";

return;

}

if(data.pinHash !== hashedPin){

document.getElementById("loginStatus")
.innerText =
"Invalid PIN";

return;

}

const age =
Date.now() - (data.lastLogin || 0);

if(age > 3600000){

firebase.database()
.ref("facultyAuth/" + facultyId)
.update({

loggedIn:false

});

}

if(data.loggedIn && age < 3600000){

const forceLogin = confirm(

"Already logged in on another device.\n\nDo you want to force logout previous session?"

);

if(!forceLogin){

return;

}

firebase.database()
.ref("facultyAuth/" + facultyId)
.update({

loggedIn:true,
lastLogin:Date.now()

});

}

firebase.database()
.ref("facultyAuth/" + facultyId)
.update({

loggedIn:true,
lastLogin:Date.now()

});

localStorage.setItem(
"facultyId",
facultyId
);

localStorage.setItem(
"facultyAuthenticated",
"true"
);

currentFacultyId =
facultyId;

isAuthenticated =
true;

showDashboard(facultyId);

})

.catch(function(error){

console.error(
"Firebase login error:",
error
);

document.getElementById("loginStatus")
.innerText =
"Firebase connection error";

});

}

/* ===================================================== */
/* SHOW DASHBOARD */
/* ===================================================== */

function showDashboard(facultyId){

document.getElementById("loginContainer")
.style.display = "none";

document.getElementById("mainDashboard")
.style.display = "block";

document.getElementById("facultyDisplay")
.innerText =
"Logged in as Faculty ID: " +
facultyId;

setTimeout(function(){

initializeMap();

setTimeout(function(){

if(map){

map.invalidateSize(true);

updateMap();

}

},1000);

},300);

}

/* ===================================================== */
/* LOGOUT */
/* ===================================================== */

function logoutFaculty(){

if(currentFacultyId){

firebase.database()
.ref("facultyAuth/" + currentFacultyId)
.update({

loggedIn:false

});

}

localStorage.removeItem("facultyId");

localStorage.removeItem(
"facultyAuthenticated"
);

currentFacultyId = null;

isAuthenticated = false;

window.location.reload();

}

/* ===================================================== */
/* SEND REQUEST */
/* ===================================================== */

function sendRequest(block){

if(!isAuthenticated){

document.getElementById("requestStatus")
.innerText =
"Faculty authentication required.";

return;

}

const lastRequest =
localStorage.getItem(
"lastBuggyRequestBlock"
);

const lastTime =
localStorage.getItem(
"lastBuggyRequestTime"
);

if(lastTime){

const diff =
Date.now() -
parseInt(lastTime);

if(diff < 600000){

document.getElementById("requestStatus")
.innerText =
"You already requested recently.";

return;

}

}

requestBuggy(block);

localStorage.setItem(
"lastBuggyRequestBlock",
block
);

localStorage.setItem(
"lastBuggyRequestTime",
Date.now()
);

const buttons =
document.querySelectorAll(".reqBtn");

buttons.forEach(btn=>{

if(btn.id !== "facultyLoginBtn"){

btn.disabled = true;
btn.style.opacity = 0.5;

}

});

setTimeout(function(){

buttons.forEach(btn=>{

btn.disabled = false;
btn.style.opacity = 1;

});

},600000);

document.getElementById("requestStatus")
.innerText =
"Request sent from " +
block.replaceAll("_"," ") +
". Please wait for the buggy.";

}

/* ===================================================== */
/* FORCE REFRESH */
/* ===================================================== */

window.onpageshow =
function(event){

if(event.persisted){

window.location.reload();

}

};

</script>
